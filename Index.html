<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Notes</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 400px; margin: auto; }
        textarea { width: 100%; height: 100px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; }
        .note { background: white; padding: 15px; border-radius: 8px; margin-top: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; }
        .delete-btn { color: #dc3545; font-size: 0.8em; cursor: pointer; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 Note Tracker</h2>
    <textarea id="noteInput" placeholder="Write a note..."></textarea>
    <button onclick="addNote()">Save Note</button>
    <div id="notesList"></div>
</div>

<script>
    // Load notes from LocalStorage on startup
    document.addEventListener("DOMContentLoaded", displayNotes);

    function addNote() {
        const input = document.getElementById('noteInput');
        if (!input.value) return;

        const notes = JSON.parse(localStorage.getItem('myNotes') || "[]");
        notes.push(input.value);
        localStorage.setItem('myNotes', JSON.stringify(notes));
        
        input.value = '';
        displayNotes();
    }

    function displayNotes() {
        const notes = JSON.parse(localStorage.getItem('myNotes') || "[]");
        const list = document.getElementById('notesList');
        list.innerHTML = notes.map((note, index) => `
            <div class="note">
                ${note}
                <span class="delete-btn" onclick="deleteNote(${index})">Delete</span>
            </div>
        `).join('');
    }

    function deleteNote(index) {
        const notes = JSON.parse(localStorage.getItem('myNotes') || "[]");
        notes.splice(index, 1);
        localStorage.setItem('myNotes', JSON.stringify(notes));
        displayNotes();
    }
</script>

</body>
</html>
