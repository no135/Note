<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechNotes Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        body.dark-mode { background-color: #121212; color: #e0e0e0; }
        .dark-mode .card { background-color: #1e1e1e; color: white; border-color: #333; }
        .note-card { transition: transform 0.2s; cursor: pointer; }
        .note-card:hover { transform: translateY(-5px); }
        .pinned { border: 2px solid #ffc107 !important; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4 shadow">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🚀 TechNotes Pro</span>
        <button class="btn btn-sm btn-outline-light" onclick="toggleDarkMode()">Toggle Theme</button>
    </div>
</nav>

<div class="container">
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <input type="text" id="noteTitle" class="form-control mb-2 fw-bold" placeholder="Title">
            <textarea id="noteContent" class="form-control mb-2" rows="3" placeholder="Start typing..." oninput="updateCharCount()"></textarea>
            
            <div class="d-flex gap-2 mb-3">
                <select id="noteCategory" class="form-select form-select-sm">
                    <option value="Personal">Personal</option>
                    <option value="Work">Work</option>
                    <option value="Idea">Idea</option>
                </select>
                <small class="text-muted mt-1"><span id="charCount">0</span> characters</small>
            </div>
            
            <button class="btn btn-primary w-100" onclick="saveNote()">Save Note</button>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col">
            <input type="text" id="searchInput" class="form-control" placeholder="Search notes..." onkeyup="displayNotes()">
        </div>
        <div class="col-auto">
            <button class="btn btn-outline-secondary" onclick="exportNotes()">Export Data</button>
        </div>
    </div>

    <div id="notesList" class="row g-3">
        </div>
</div>

<script>
    let notes = JSON.parse(localStorage.getItem('techNotes') || "[]");

    function saveNote() {
        const title = document.getElementById('noteTitle').value;
        const content = document.getElementById('noteContent').value;
        const category = document.getElementById('noteCategory').value;

        if (!content) return alert("Note cannot be empty!");

        const newNote = {
            id: Date.now(),
            title: title || "Untitled",
            content: content,
            category: category,
            date: new Date().toLocaleString(),
            pinned: false
        };

        notes.unshift(newNote);
        syncStorage();
        clearInput();
    }

    function displayNotes() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const list = document.getElementById('notesList');
        list.innerHTML = '';

        const filtered = notes.filter(n => 
            n.title.toLowerCase().includes(searchTerm) || 
            n.content.toLowerCase().includes(searchTerm)
        );

        if (filtered.length === 0) {
            list.innerHTML = '<div class="text-center mt-5 text-muted"><h5>No notes found. Start creating!</h5></div>';
            return;
        }

        filtered.forEach((note) => {
            const card = `
                <div class="col-md-6 col-lg-4">
                    <div class="card h-100 note-card shadow-sm ${note.pinned ? 'pinned' : ''}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <span class="badge bg-info mb-2">${note.category}</span>
                                <button class="btn btn-sm" onclick="togglePin(${note.id})">${note.pinned ? '📌' : '📍'}</button>
                            </div>
                            <h5 class="card-title">${note.title}</h5>
                            <p class="card-text">${note.content}</p>
                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <small class="text-muted" style="font-size: 0.7rem;">${note.date}</small>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteNote(${note.id})">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            list.innerHTML += card;
        });
    }

    function togglePin(id) {
        const note = notes.find(n => n.id === id);
        note.pinned = !note.pinned;
        notes.sort((a, b) => b.pinned - a.pinned); // Keep pinned at top
        syncStorage();
    }

    function deleteNote(id) {
        notes = notes.filter(n => n.id !== id);
        syncStorage();
    }

    function syncStorage() {
        localStorage.setItem('techNotes', JSON.stringify(notes));
        displayNotes();
    }

    function clearInput() {
        document.getElementById('noteTitle').value = '';
        document.getElementById('noteContent').value = '';
        document.getElementById('charCount').innerText = '0';
    }

    function updateCharCount() {
        const len = document.getElementById('noteContent').value.length;
        document.getElementById('charCount').innerText = len;
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
    }

    function exportNotes() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(notes));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "my_notes_backup.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    // Initial Render
    displayNotes();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
