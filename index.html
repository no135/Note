<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Note Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .navbar { background-color: #ffffff; border-bottom: 1px solid #e0e0e0; }
        .note-card { transition: transform 0.2s; border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .note-card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .timestamp { font-size: 0.75rem; color: #6c757d; }
        #notesList { margin-top: 2rem; }
    </style>
</head>
<body>

<nav class="navbar sticky-top mb-4">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand mb-0 h1 fw-600 text-primary">Notes Pro</span>
        <input type="text" id="searchInput" class="form-control w-50" placeholder="Search notes..." onkeyup="displayNotes()">
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-3 shadow-sm border-0 mb-4">
                <textarea id="noteInput" class="form-control border-0 shadow-none" rows="3" placeholder="What's on your mind?"></textarea>
                <div class="d-flex justify-content-end mt-2">
                    <button class="btn btn-primary px-4 fw-600" onclick="addNote()">Save Note</button>
                </div>
            </div>

            <div id="notesList" class="row row-cols-1 g-3"></div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", displayNotes);

    function addNote() {
        const input = document.getElementById('noteInput');
        if (!input.value.trim()) return;

        const notes = JSON.parse(localStorage.getItem('proNotes') || "[]");
        const newNote = {
            text: input.value,
            date: new Date().toLocaleString(),
            id: Date.now()
        };

        notes.unshift(newNote); // Add newest note to the top
        localStorage.setItem('proNotes', JSON.stringify(notes));
        
        input.value = '';
        displayNotes();
    }

    function displayNotes() {
        const notes = JSON.parse(localStorage.getItem('proNotes') || "[]");
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const list = document.getElementById('notesList');
        
        const filteredNotes = notes.filter(n => n.text.toLowerCase().includes(searchTerm));

        if (filteredNotes.length === 0) {
            list.innerHTML = `<div class="text-center text-muted mt-5">No notes found. Start writing!</div>`;
            return;
        }

        list.innerHTML = filteredNotes.map(note => `
            <div class="col">
                <div class="card note-card h-100 p-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <p class="mb-2 text-dark">${note.text.replace(/\n/g, '<br>')}</p>
                        <button class="btn-close ms-2" style="font-size: 0.7rem;" onclick="deleteNote(${note.id})"></button>
                    </div>
                    <div class="timestamp pt-2 border-top mt-auto">
                        ${note.date}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function deleteNote(id) {
        let notes = JSON.parse(localStorage.getItem('proNotes') || "[]");
        notes = notes.filter(n => n.id !== id);
        localStorage.setItem('proNotes', JSON.stringify(notes));
        displayNotes();
    }
</script>

</body>
</html>
